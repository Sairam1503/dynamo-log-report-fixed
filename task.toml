artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log into a small JSON summary report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "generate"]
artifact_type = ["text_or_log_file", "generated_output_artifact"]
expert_time_estimate_hours = 0.3
model_tested = "GPT-5.4"
agent_tested = "Terminus-2"
difficulty_explanation = "Requires parsing Apache-style log lines to extract IPs and HTTP paths, then aggregating counts and tie-breaking for the top path."
solution_explanation = "Read /app/access.log line by line, count requests and unique IPs, tally paths from quoted HTTP methods, and write the summary JSON to /app/report.json."
verification_explanation = "Pytest loads /app/report.json and checks the schema plus that total_requests, unique_ips, and top_path match values derived from /app/access.log."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []
